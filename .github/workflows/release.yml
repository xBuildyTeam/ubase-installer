name: "Release uBase Installer"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm install

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'uBase Installer ${{ github.ref_name }}'
          releaseBody: 'See release notes below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  generate-updater-and-notes:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes from Git Log
        id: git-log
        run: |
          # Find the previous tag if it exists, otherwise use the first commit
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found. Getting all commits."
            CHANGELOG=$(git log --oneline)
          else
            echo "Previous tag: $PREV_TAG"
            CHANGELOG=$(git log --oneline ${PREV_TAG}..HEAD)
          fi
          
          # Escape newlines for GitHub Actions output
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          echo "changelog=$CHANGELOG" >> "$GITHUB_OUTPUT"

      - name: Create or Update Release with Notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## Changelog
            ${{ steps.git-log.outputs.changelog }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json for Auto-Updater
        run: |
          TAG_NAME="${{ github.ref_name }}"
          cat <<EOF > latest.json
          {
            "version": "${TAG_NAME}",
            "notes": "See release notes",
            "pub_date": "2026-07-13T00:00:00Z",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/xBuildyTeam/ubase-installer/releases/download/${TAG_NAME}/ubase-installer_${TAG_NAME}_aarch64.app.tar.gz",
                "signature": ""
              },
              "darwin-x86_64": {
                "url": "https://github.com/xBuildyTeam/ubase-installer/releases/download/${TAG_NAME}/ubase-installer_${TAG_NAME}_x64.app.tar.gz",
                "signature": ""
              },
              "linux-x86_64": {
                "url": "https://github.com/xBuildyTeam/ubase-installer/releases/download/${TAG_NAME}/ubase-installer_${TAG_NAME}_amd64.AppImage.tar.gz",
                "signature": ""
              },
              "windows-x86_64": {
                "url": "https://github.com/xBuildyTeam/ubase-installer/releases/download/${TAG_NAME}/ubase-installer_${TAG_NAME}_x64_en-US.msi.zip",
                "signature": ""
              }
            }
          }
          EOF

      - name: Upload latest.json to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
